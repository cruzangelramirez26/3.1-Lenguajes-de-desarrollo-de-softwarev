  --teal:#14b8a6;--tealBg:rgba(20,184,166,.08);

body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;line-height:1.7;min-height:100vh}

.opt.correct{border-color:var(--green2);background:var(--greenBg)}.opt.correct .letter{background:var(--green);color:#fff}

.fb-trap .trap-tag{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;color:var(--amber);font-weight:600;margin-bottom:4px}

    <h1>Lenguajes de Desarrollo de Software</h1>
    <p>Clasificación · Compiladores vs Intérpretes · Sintaxis y Semántica · Sistemas de tipos · Scope · Subprogramas · Depuración</p>
  </div>

<script>
const MAPA = [
  {
    cls:'intro', icon:'💡', title:'¿Qué es un lenguaje de programación?',
    sub:'La base — antes de clasificar',
    desc:'Un lenguaje de programación es un sistema formal de notación que permite a los humanos expresar instrucciones para que una computadora las ejecute. Es el puente entre el pensamiento humano y el hardware.',
    items:[
      { dot:'#0d9488', name:'Niveles de abstracción', tag:'Jerarquía',
        body:`Los lenguajes se ordenan por qué tan cerca o lejos están del hardware:<br><br>
<strong>Lenguaje máquina:</strong> 0s y 1s. Lo único que entiende el procesador directamente. Específico de cada arquitectura.<br>
<strong>Ensamblador (Assembly):</strong> mnemónicos que representan instrucciones de máquina (MOV, ADD, JMP). Un ensamblador lo convierte a código máquina. Aún específico de arquitectura.<br>
<strong>Alto nivel:</strong> sintaxis cercana al inglés. Abstraen el hardware completamente. C, Python, Java, etc.<br><br>
<strong>Microprogramación:</strong> nivel aún más bajo que el ensamblador — instrucciones dentro del microcontrolador/procesador que implementan las instrucciones de máquina.
<div class="tip"><strong>⚡ EGEL:</strong> Microprogramación → ensamblador → alto nivel. Cada nivel abstrae más al nivel anterior.</div>` },
      { dot:'#0d9488', name:'Tipos de lenguajes de alto nivel', tag:'Clasificación',
        body:`El SWEBOK clasifica los lenguajes de alto nivel según su paradigma predominante:<br><br>
<strong>Procedurales/imperativos:</strong> C, Pascal, COBOL — secuencia de instrucciones con estado mutable.<br>
<strong>Orientados a objetos:</strong> Java, C++, C#, Python, Smalltalk — organizan el código en objetos.<br>
<strong>Funcionales:</strong> Haskell, Erlang, Lisp — funciones puras, sin estado mutable.<br>
<strong>Lógicos:</strong> Prolog — hechos, reglas y motor de inferencia.<br>
<strong>Scripting:</strong> JavaScript, Python, Ruby, PHP — interpretados, alto nivel, glue code.<br>
<strong>DSL (Domain-Specific Language):</strong> SQL, HTML, CSS, Terraform — específicos de un dominio.
<div class="tip"><strong>⚡ EGEL:</strong> Un lenguaje puede soportar más de un paradigma. Python es multi-paradigma: procedural + OOP + funcional. La guía EGEL menciona explícitamente scripting como categoría separada.</div>` },
    ]
  },
  {
    cls:'comp', icon:'⚙️', title:'Compiladores vs Intérpretes vs JIT',
    sub:'Cómo se traduce el código fuente a instrucciones ejecutables',
    desc:'Todo código fuente necesita traducirse a instrucciones que el procesador pueda ejecutar. Hay tres mecanismos principales para lograrlo.',
    items:[
      { dot:'#7c3aed', name:'Compiladores', tag:'Traducción estática',
        body:`El compilador traduce <strong>todo el programa fuente a código máquina antes de ejecutarlo</strong>. El resultado es un ejecutable independiente.<br><br>
<strong>Fases del compilador:</strong><br>
1. <strong>Análisis léxico (Lexer/Scanner):</strong> convierte el texto en tokens (palabras clave, identificadores, operadores).<br>
2. <strong>Análisis sintáctico (Parser):</strong> construye el árbol de parseo (AST) según la gramática del lenguaje.<br>
3. <strong>Análisis semántico:</strong> verifica tipos, declaraciones, compatibilidad — el significado.<br>
4. <strong>Generación de código intermedio.</strong><br>
5. <strong>Optimización.</strong><br>
6. <strong>Generación de código máquina.</strong><br>
7. <strong>Enlazado (Linker):</strong> une módulos y bibliotecas en el ejecutable final.<br><br>
<strong>Lenguajes compilados:</strong> C, C++, Java (a bytecode), Go, Rust.
<div class="tip"><strong>⚡ EGEL:</strong> Errores de sintaxis los detecta el compilador en la fase de análisis sintáctico — antes de ejecutar nada.</div>` },
      { dot:'#7c3aed', name:'Intérpretes', tag:'Traducción dinámica',
        body:`El intérprete <strong>lee y ejecuta el código fuente línea por línea en tiempo de ejecución</strong>. No hay fase de compilación previa.<br><br>
<strong>Ventajas:</strong> más portables (el mismo script corre en cualquier plataforma con el intérprete instalado), ciclo de desarrollo más rápido, tipado dinámico fácil de implementar.<br>
<strong>Desventajas:</strong> más lentos que los compilados (la traducción ocurre cada vez que se ejecuta), requieren el intérprete en la máquina destino.<br><br>
<strong>Lenguajes interpretados:</strong> Python, Ruby, PHP, JavaScript (clásico), Perl.
<div class="ex"><strong>Analogía:</strong> Compilador = traducir todo un libro antes de leerlo. Intérprete = traductor simultáneo que interpreta mientras el autor habla.</div>` },
      { dot:'#7c3aed', name:'JIT y máquinas virtuales', tag:'Híbrido',
        body:`<strong>JIT (Just-In-Time compilation):</strong> compila partes del código en tiempo de ejecución, justo cuando se van a usar. Combina ventajas de ambos enfoques.<br><br>
<strong>Java Virtual Machine (JVM):</strong> Java compila a <em>bytecode</em> (no código máquina nativo). La JVM interpreta o compila JIT el bytecode. Esto da portabilidad ("Write Once, Run Anywhere") sin sacrificar tanto rendimiento.<br><br>
<strong>Cross-compiler:</strong> compilador que genera código para una arquitectura diferente a la que lo ejecuta. Común en desarrollo embebido (compilar en x86 para ARM).
<div class="tip"><strong>⚡ EGEL:</strong> Java NO es puramente compilado ni puramente interpretado. Compila a bytecode, que la JVM ejecuta via JIT. Esta distinción sale en el examen.</div>` },
      { dot:'#7c3aed', name:'Tokens, gramáticas y árboles de parseo', tag:'Análisis léxico/sintáctico',
        body:`<strong>Token:</strong> unidad léxica mínima. En <code>int x = 5;</code> los tokens son: <code>int</code> (keyword), <code>x</code> (identifier), <code>=</code> (operator), <code>5</code> (literal), <code>;</code> (separator).<br><br>
<strong>Gramática (BNF/EBNF):</strong> reglas formales que definen qué secuencias de tokens son válidas. Define la <em>sintaxis</em> del lenguaje.<br><br>
<strong>Árbol de parseo (AST):</strong> estructura jerárquica que representa la estructura sintáctica del programa. El compilador lo usa para generar código.
<div class="code"><span class="c">// Expresión: a + b * c</span>
<span class="c">// Árbol de parseo (respeta precedencia):</span>
<span class="n">     +</span>
<span class="n">    / \\</span>
<span class="n">   a   *</span>
<span class="n">      / \\</span>
<span class="n">     b   c</span></div>
<div class="tip"><strong>⚡ EGEL:</strong> La precedencia de operadores (multiplicación antes que suma) queda codificada en el árbol de parseo, no en los tokens.</div>` },
    ]
  },
  {
    cls:'tipos', icon:'🏷️', title:'Sistemas de tipos',
    sub:'Cómo los lenguajes manejan los tipos de datos',
    desc:'Un sistema de tipos asigna un tipo a cada valor y expresión del programa. Define qué operaciones son válidas y cuándo se verifican.',
    items:[
      { dot:'#2563eb', name:'Tipado estático vs dinámico', tag:'Cuándo se verifica',
        body:`<strong>Tipado estático:</strong> los tipos se verifican en <em>tiempo de compilación</em>. Las variables tienen tipos fijos declarados por el programador. Los errores de tipo se detectan antes de ejecutar.<br>
<strong>Lenguajes:</strong> C, C++, Java, C#, TypeScript, Go, Rust.<br><br>
<strong>Tipado dinámico (polimórfico):</strong> los tipos se verifican en <em>tiempo de ejecución</em>. Las variables pueden cambiar de tipo. Más flexible, pero los errores de tipo aparecen durante la ejecución.<br>
<strong>Lenguajes:</strong> Python, JavaScript, Ruby, PHP, Perl.
<div class="code"><span class="c">// Estático (Java): tipo fijo en compilación</span>
<span class="k">int</span> <span class="n">x</span> = 5;
<span class="n">x</span> = <span class="s">"hola"</span>; <span class="c">// Error en compilación</span>

<span class="c"># Dinámico (Python): tipo en runtime</span>
<span class="n">x</span> = 5
<span class="n">x</span> = <span class="s">"hola"</span>  <span class="c"># Válido</span></div>` },
      { dot:'#2563eb', name:'Tipado fuerte vs débil', tag:'Qué tan estricto',
        body:`<strong>Tipado fuerte:</strong> no hay conversiones implícitas entre tipos incompatibles. Python es dinámico pero fuerte: <code>"5" + 5</code> da error.<br>
<strong>Tipado débil:</strong> realiza conversiones implícitas. JavaScript: <code>"5" + 5</code> da <code>"55"</code> (coerción implícita).<br><br>
<strong>La combinación importa:</strong><br>
<div class="vs-grid">
<div class="vs-box"><h4 style="color:#2563eb">Estático + Fuerte</h4>Java, C# — máxima seguridad de tipos en compilación</div>
<div class="vs-box"><h4 style="color:#7c3aed">Dinámico + Fuerte</h4>Python — flexible pero no coerciona tipos</div>
<div class="vs-box"><h4 style="color:#ea580c">Estático + Débil</h4>C — tipos fijos pero permite casts implícitos peligrosos</div>
<div class="vs-box"><h4 style="color:#db2777">Dinámico + Débil</h4>JavaScript — máxima flexibilidad, más propenso a bugs</div>
</div>
<div class="tip"><strong>⚡ EGEL:</strong> Fuerte/débil no es lo mismo que estático/dinámico. Python es dinámico Y fuerte. C es estático Y (relativamente) débil.</div>` },
      { dot:'#2563eb', name:'Tipos primitivos y estructurados', tag:'Tipos de datos',
        body:`<strong>Tipos primitivos:</strong> valores atómicos proporcionados por el lenguaje.<br>
• <strong>Enteros:</strong> int, long, short, byte (con signo/sin signo, distintos tamaños).<br>
• <strong>Flotantes:</strong> float (32 bits), double (64 bits). IEEE 754.<br>
• <strong>Booleano:</strong> true/false.<br>
• <strong>Carácter:</strong> char. Un solo carácter Unicode o ASCII.<br><br>
<strong>Tipos estructurados:</strong> colecciones o composiciones de primitivos.<br>
• <strong>Arreglo (Array):</strong> colección homogénea de tamaño fijo en posiciones contiguas de memoria.<br>
• <strong>Struct/Record:</strong> agrupación heterogénea de campos con nombre (bases de OOP en C).<br>
• <strong>String:</strong> cadena de caracteres. Primitivo en algunos lenguajes, objeto en otros.<br>
• <strong>Puntero:</strong> almacena una dirección de memoria (C, C++).
<div class="tip"><strong>⚡ EGEL:</strong> En Java, los primitivos (int, double, boolean) no son objetos. Sus wrappers (Integer, Double, Boolean) sí lo son. Esta distinción importa para colecciones genéricas.</div>` },
    ]
  },
  {
    cls:'scope', icon:'🔭', title:'Alcance y accesibilidad (Scope)',
    sub:'Dónde son visibles y accesibles las variables',
    desc:'El scope define en qué parte del programa una variable existe y puede ser usada. Es uno de los conceptos más importantes para entender el comportamiento de un programa.',
    items:[
      { dot:'#db2777', name:'Tipos de scope', tag:'Visibilidad',
        body:`<strong>Scope local:</strong> la variable solo existe dentro del bloque/función donde se declara. Se destruye al salir del bloque.<br>
<strong>Scope global:</strong> la variable existe en todo el programa. Peligrosa: cualquier función puede modificarla.<br>
<strong>Scope de bloque:</strong> existe solo dentro del bloque {} donde se declara (let/const en JavaScript, variables en C dentro de {}).<br>
<strong>Scope de clase:</strong> atributos de una clase — visibles a todos los métodos de la clase.
<div class="code"><span class="k">int</span> <span class="n">global</span> = 10;  <span class="c">// scope global</span>

<span class="k">void</span> <span class="f">funcion</span>() {
  <span class="k">int</span> <span class="n">local</span> = 5;   <span class="c">// scope local</span>
  {
    <span class="k">int</span> <span class="n">bloque</span> = 3; <span class="c">// scope de bloque</span>
  }
  <span class="c">// bloque ya no existe aquí</span>
}</div>` },
      { dot:'#db2777', name:'Variable estática', tag:'Duración',
        body:`Una variable <strong>static</strong> en una función mantiene su valor entre llamadas. No se reinicializa en cada invocación — vive durante todo el programa.<br><br>
<strong>Diferencia con global:</strong> una estática local solo es <em>visible</em> dentro de su función (scope local), pero <em>dura</em> todo el programa (duración estática).
<div class="code"><span class="k">int</span> <span class="f">contador</span>() {
  <span class="k">static int</span> <span class="n">n</span> = 0;  <span class="c">// se init. solo la primera vez</span>
  <span class="k">return</span> ++<span class="n">n</span>;
}
<span class="c">// contador() → 1, contador() → 2, contador() → 3</span></div>
<div class="tip"><strong>⚡ EGEL:</strong> static en C/C++ dentro de una función = scope local + duración de todo el programa. No confundir con static de clase en Java (que pertenece a la clase, no a la instancia).</div>` },
      { dot:'#db2777', name:'Paso de parámetros', tag:'Mecanismos',
        body:`Cómo se pasan los valores a una función determina si la función puede modificar el original:<br><br>
<strong>Paso por valor (pass-by-value):</strong> se pasa una copia. La función no puede modificar el original. Por defecto en Java para primitivos y en C.<br>
<strong>Paso por referencia (pass-by-reference):</strong> se pasa la dirección de memoria. La función modifica el original. C++ con &, C con punteros.<br>
<strong>Paso por nombre (pass-by-name):</strong> la expresión se re-evalúa cada vez que se usa el parámetro. Raro, usado en Algol.<br>
<strong>Paso por resultado (pass-by-result / out parameters):</strong> el valor se copia de vuelta al salir. Ada, C# con out.
<div class="tip"><strong>⚡ EGEL:</strong> En Java, los objetos se pasan por referencia al valor del puntero. El objeto puede mutarse, pero la referencia en sí no cambia. "Pass by value of the reference."</div>` },
    ]
  },
  {
    cls:'sub', icon:'🔧', title:'Subprogramas y Corrutinas',
    sub:'Bloques de código reutilizables y controlables',
    desc:'Los subprogramas permiten dividir un programa en partes manejables y reutilizables. Las corrutinas extienden este concepto con control de flujo múltiple.',
    items:[
      { dot:'#d97706', name:'Funciones vs Procedimientos', tag:'Subprogramas',
        body:`<strong>Función:</strong> subprograma que retorna un valor. En la mayoría de lenguajes, el nombre de la función puede usarse como variable en una expresión.<br>
<strong>Procedimiento (void function):</strong> subprograma que NO retorna valor. Se llama por sus efectos secundarios.<br><br>
<strong>Recursión:</strong> una función que se llama a sí misma. Requiere condición base para terminar.<br>
• <strong>Recursión directa (cíclica):</strong> A se llama a sí misma.<br>
• <strong>Recursión indirecta (acíclica):</strong> A llama a B, que llama a A.<br><br>
<strong>Stack de llamadas (call stack):</strong> cada llamada a función crea un frame con sus parámetros y variables locales. La recursión profunda puede causar stack overflow.
<div class="code"><span class="k">int</span> <span class="f">factorial</span>(<span class="k">int</span> <span class="n">n</span>) {
  <span class="k">if</span> (<span class="n">n</span> <= 1) <span class="k">return</span> 1;       <span class="c">// condición base</span>
  <span class="k">return</span> <span class="n">n</span> * <span class="f">factorial</span>(<span class="n">n</span>-1); <span class="c">// recursión directa</span>
}</span></div>` },
      { dot:'#d97706', name:'Corrutinas (Coroutines)', tag:'Multiples puntos de entrada',
        body:`Una <strong>corrutina</strong> es un subprograma con <em>múltiples puntos de entrada y salida</em>. Puede pausar su ejecución y reanudarse desde donde la dejó.<br><br>
<strong>Diferencia con función normal:</strong> una función tiene UN punto de entrada y UN punto de salida (return). Una corrutina puede salir y volver a entrar múltiples veces.<br><br>
<strong>Llamada:</strong> resume (no call). La primera llamada entra desde el inicio. Las siguientes retoman desde el punto donde se pausó.
<div class="code"><span class="c"># Python — generador como corrutina</span>
<span class="k">def</span> <span class="f">contador</span>():
    <span class="n">n</span> = 0
    <span class="k">while True</span>:
        <span class="k">yield</span> <span class="n">n</span>   <span class="c"># pausa y retorna n</span>
        <span class="n">n</span> += 1    <span class="c"># reanuda aquí en siguiente llamada</span>

<span class="n">gen</span> = <span class="f">contador</span>()
<span class="f">next</span>(<span class="n">gen</span>)  <span class="c"># → 0</span>
<span class="f">next</span>(<span class="n">gen</span>)  <span class="c"># → 1</span></div>
<div class="tip"><strong>⚡ EGEL:</strong> Lenguajes con corrutinas nativas: C++20, C#, Java (virtual threads), JavaScript (async/await), Kotlin, Python (generators). C no las tiene nativamente.</div>` },
    ]
  },
  {
    cls:'debug', icon:'🐛', title:'Depuración — Tipos de errores',
    sub:'Identificar y corregir fallas en el código',
    desc:'Todo programa puede tener errores. Conocer el tipo de error determina cuándo se detecta y cómo se corrige.',
    items:[
      { dot:'#16a34a', name:'Errores de sintaxis', tag:'Compilación',
        body:`Desviaciones de las reglas gramaticales del lenguaje. El compilador o intérprete los detecta <strong>antes de ejecutar</strong>.<br><br>
<strong>Ejemplos:</strong> paréntesis sin cerrar, punto y coma faltante, palabra clave mal escrita, llaves desbalanceadas.<br><br>
<strong>Fáciles de corregir:</strong> el compilador indica exactamente la línea y el tipo de error.
<div class="code"><span class="c">// Error de sintaxis en Java</span>
<span class="k">if</span> (<span class="n">x</span> > 0)        <span class="c">// falta {</span>
  <span class="n">System.out.println</span>(<span class="s">"positivo"</span>)
<span class="c">// Falta ; al final</span></div>` },
      { dot:'#16a34a', name:'Errores de runtime (ejecución)', tag:'Ejecución',
        body:`Ocurren <strong>mientras el programa está corriendo</strong>, ante condiciones inesperadas que el compilador no puede predecir.<br><br>
<strong>Ejemplos comunes:</strong><br>
• División por cero.<br>
• Acceso a índice fuera de rango (ArrayIndexOutOfBoundsException).<br>
• Referencia nula (NullPointerException).<br>
• Memoria insuficiente (OutOfMemoryError).<br>
• Acceso a memoria inválida (segmentation fault en C).<br><br>
<strong>Se manejan con:</strong> excepciones (try/catch), validaciones previas.
<div class="tip"><strong>⚡ EGEL:</strong> Se detectan probando con distintos conjuntos de datos: válidos, inválidos y valores límite (boundary values).</div>` },
      { dot:'#16a34a', name:'Errores lógicos', tag:'Resultado incorrecto',
        body:`El programa ejecuta <strong>sin fallar pero produce resultados incorrectos</strong>. El más difícil de detectar porque no hay mensaje de error.<br><br>
<strong>Ejemplos:</strong> condición lógica invertida (usar > en vez de >=), orden incorrecto de operaciones, algoritmo de ordenamiento con lógica errónea.<br><br>
<strong>Cómo detectarlos:</strong> pruebas unitarias que verifican el resultado esperado, depuradores (debuggers) que inspeccionan el estado paso a paso, logging.
<div class="code"><span class="c">// Error lógico: cuenta los pares incorrectamente</span>
<span class="k">for</span> (<span class="k">int</span> <span class="n">i</span> = 0; <span class="n">i</span> < <span class="n">n</span>; <span class="n">i</span>++) {
  <span class="k">if</span> (<span class="n">i</span> % 2 == 1)  <span class="c">// debería ser == 0 para pares</span>
    <span class="n">cuenta</span>++;
}</div>
<div class="tip"><strong>⚡ EGEL:</strong> Sintaxis = compilador los detecta. Runtime = se detectan al probar. Lógicos = requieren pruebas con resultados esperados definidos.</div>` },
    ]
  }
];

const nodeState = {};
const childState = {};
let activeCompara = 0;
let flashItems = [...FLASH];
let flashIdx = 0;
let flashFlipped = false;
let flashFilter = 'all';
let qIdx = 0;
let qAnswers = Array(QUESTIONS.length).fill(null);
let qLocked = Array(QUESTIONS.length).fill(false);
let quizDone = false;

function showPage(id) {
  ['mapa','compara','flash','quiz'].forEach(p => {
    document.getElementById('page-'+p).classList.toggle('hidden', p !== id);
  });
  document.querySelectorAll('.ntab').forEach((t,i) => {
    t.classList.toggle('active', ['mapa','compara','flash','quiz'][i] === id);
  });
  if (id==='compara') renderCompara();
  if (id==='flash') renderFlash();
  if (id==='quiz') renderQuiz();
  if (id==='mapa') renderMapa();
  window.scrollTo(0,0);
}

function renderMapa() {
  const pg = document.getElementById('page-mapa');
  const conn = `<div class="d-conn"><div class="d-conn-line"></div><div class="d-conn-txt">▼</div><div class="d-conn-line"></div></div>`;
  pg.innerHTML = MAPA.map((node,ni) => {
    const open = nodeState[ni] ? 'open' : '';
    const children = node.items.map((item,ci) => {
      const cop = childState[`${ni}-${ci}`] ? 'open' : '';
      return `<div class="child ${cop}" onclick="toggleChild(${ni},${ci})">
        <div class="child-head">
          <div class="child-dot" style="background:${item.dot}"></div>
          <span class="child-name">${item.name}</span>
          <span class="child-tag">${item.tag}</span>
          <span class="child-arrow">▶</span>
        </div>
        <div class="child-body">${item.body}</div>
      </div>`;
    }).join('');
    return `<div class="node ${node.cls} ${open}">
      <div class="node-head" onclick="toggleNode(${ni})">
        <span class="node-icon">${node.icon}</span>
        <div><div class="node-title">${node.title}</div><div class="node-sub">${node.sub}</div></div>
        <span class="node-arrow">▶</span>
      </div>
      <div class="node-body">
        <p style="font-size:13px;color:var(--text2);margin-bottom:10px">${node.desc}</p>
        ${children}
      </div>
    </div>`;
  }).join(conn);
}

function toggleNode(ni) { nodeState[ni]=!nodeState[ni]; renderMapa(); }
function toggleChild(ni,ci) { const k=`${ni}-${ci}`; childState[k]=!childState[k]; renderMapa(); }

function renderCompara() {
  const pg = document.getElementById('page-compara');
  const c = COMPARA[activeCompara];
  const tabs = COMPARA.map((cc,i) => `<button class="ctab ${i===activeCompara?'active':''}" onclick="setCompara(${i})">${cc.label}</button>`).join('');
  const ths = c.cols.map(h=>`<th>${h}</th>`).join('');
  const rows = c.rows.map(r=>`<tr><td>${r[0]}</td>${r.slice(1).map(v=>`<td>${v}</td>`).join('')}</tr>`).join('');
  pg.innerHTML = `<div class="comp-tabs">${tabs}</div>
  <div class="comp-wrap"><table><thead><tr><th></th>${ths}</tr></thead><tbody>${rows}</tbody></table></div>`;
}
function setCompara(i) { activeCompara=i; renderCompara(); }

function getFlashItems() { return flashFilter==='all'?FLASH:FLASH.filter(f=>f.cat===flashFilter); }
function renderFlash() {
  const pg = document.getElementById('page-flash');
  flashItems = getFlashItems();
  if(flashIdx>=flashItems.length) flashIdx=0;
  const item = flashItems[flashIdx];
  const cats = [...new Set(FLASH.map(f=>f.cat))];
  const filterBtns = ['all',...cats].map(c=>`<button class="ff-btn ${flashFilter===c?'active':''}" onclick="setFlashFilter('${c}')">${c==='all'?'Todas':c}</button>`).join('');
  const dots = flashItems.map((_,i)=>`<div class="fp-dot ${i<flashIdx?'done':i===flashIdx?'cur':''}"></div>`).join('');
  const inner = flashFlipped
    ? `<div class="flash-ans"><div class="ans-title">${item.a}</div><div class="ans-body">${item.body}</div><div class="ans-key">🔑 ${item.key}</div></div>`
    : `<div><div class="flash-emoji">${item.emoji}</div><div class="flash-q">${item.q}</div></div>`;
  pg.innerHTML = `<div class="flash-filter">${filterBtns}</div>
  <div class="flash-wrap">
    <div class="flash-progress">${dots}</div>
    <span class="flash-cat" style="background:${item.bg};color:${item.color}">${item.cat}</span>
    <div class="flash-card" onclick="flipFlash()">${inner}</div>
    <div class="flash-nav">
      <button class="btn btn-ghost" ${flashIdx===0?'disabled':''} onclick="moveFlash(-1)">←</button>
      <span class="flash-ctr">${flashIdx+1} / ${flashItems.length}</span>
      <button class="btn btn-primary" onclick="moveFlash(1)">${flashIdx===flashItems.length-1?'Reiniciar':'Siguiente →'}</button>
    </div>
  </div>`;
}
function flipFlash() { flashFlipped=!flashFlipped; renderFlash(); }
function moveFlash(d) { flashFlipped=false; flashIdx=(flashIdx+d+flashItems.length)%flashItems.length; renderFlash(); }
function setFlashFilter(cat) { flashFilter=cat; flashIdx=0; flashFlipped=false; renderFlash(); }

function renderQuiz() {
  const pg = document.getElementById('page-quiz');
  if(quizDone){ pg.innerHTML=renderResults(); return; }
  const q = QUESTIONS[qIdx];
  const prog = Math.round(qIdx/QUESTIONS.length*100);
  const letters = ['A','B','C','D'];
  const hasCode = q.q.includes('\n');
  let qHtml = '';
  if(hasCode) {
    const parts = q.q.split('\n\n');
    if(parts.length >= 3) {
      const intro = parts[0];
      const code = parts.slice(1, parts.length-1).join('\n\n');
      const pregunta = parts[parts.length-1];
      qHtml = `<div class="qtxt" style="margin-bottom:8px">${intro}</div><div class="qcode">${code.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div><div class="qtxt">${pregunta}</div>`;
    } else if(parts.length === 2) {
      const code = parts[0];
      const pregunta = parts[1];
      qHtml = `<div class="qcode">${code.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div><div class="qtxt">${pregunta}</div>`;
    } else {
      qHtml = `<div class="qtxt">${q.q}</div>`;
    }
  } else {
    qHtml = `<div class="qtxt">${q.q}</div>`;
  }
  const opts = q.opts.map((o,i)=>{
    let cls='opt';
    if(qLocked[qIdx]){ cls+=' locked'; if(i===q.ans) cls+=' correct'; else if(i===qAnswers[qIdx]&&i!==q.ans) cls+=' wrong'; else cls+=' dimmed'; }
    return `<button class="${cls}" onclick="qAnswer(${i})"><span class="letter">${letters[i]}</span><span>${o}</span></button>`;
  }).join('');
  const fb = qLocked[qIdx] ? `<div class="fb ${qAnswers[qIdx]===q.ans?'ok':'no'}">
    <div class="fb-tag">${qAnswers[qIdx]===q.ans?'✓ CORRECTO':'✗ INCORRECTO'}</div>
    <div class="fb-text">${q.exp}</div>
    <div class="fb-trap"><div class="trap-tag">⚠ TRAMPA</div><p>${q.trap}</p></div>
  </div>` : '';
  const dots = QUESTIONS.map((_,i)=>{
    const a=qAnswers[i]; const ic=a===QUESTIONS[i].ans; const iw=a!==null&&!ic;
    const bg=i===qIdx?'var(--teal)':ic?'var(--green)':iw?'var(--red)':'var(--card2)';
    const bd=i===qIdx?'var(--teal)':ic?'var(--green2)':iw?'var(--red2)':'var(--border)';
    const col=(i===qIdx||a!==null)?'#fff':'var(--text2)';
    return `<button class="qdot" onclick="goQ(${i})" style="background:${bg};border-color:${bd};color:${col}">${i+1}</button>`;
  }).join('');
  pg.innerHTML = `<div class="pbar"><div class="label">${qIdx+1}/${QUESTIONS.length}</div><div class="track"><div class="fill" style="width:${prog}%"></div></div><div class="label">${prog}%</div></div>
  <div class="qcard">
    <div class="qnum">PREGUNTA ${qIdx+1}</div>
    <span class="qtag ${q.cat}">${q.catL}</span>
    ${qHtml}
    <div class="opts">${opts}</div>
    ${fb}
    ${qLocked[qIdx]?`<div class="nav">
      ${qIdx>0?`<button class="btn btn-ghost" onclick="goQ(${qIdx-1})">← Anterior</button>`:''}
      ${qIdx<QUESTIONS.length-1?`<button class="btn btn-primary" onclick="goQ(${qIdx+1})">Siguiente →</button>`:`<button class="btn btn-primary" onclick="finishQuiz()">Ver resultados</button>`}
    </div>`:''}
    <div class="qdots">${dots}</div>
  </div>`;
}

function qAnswer(i) { if(qLocked[qIdx]) return; qAnswers[qIdx]=i; qLocked[qIdx]=true; renderQuiz(); }
function goQ(i) { qIdx=i; renderQuiz(); window.scrollTo(0,0); }
function finishQuiz() { quizDone=true; renderQuiz(); }

function renderResults() {
  const total=QUESTIONS.length;
  const correct=qAnswers.filter((a,i)=>a===QUESTIONS[i].ans).length;
  const pct=Math.round(correct/total*100);
  const cls=pct>=80?'score-ok':pct>=60?'score-mid':'score-bad';
  const cats=[
    {id:'comp',label:'Compiladores',color:'#7c3aed'},
    {id:'tipos',label:'Sistemas de tipos',color:'#2563eb'},
    {id:'scope',label:'Scope y Parámetros',color:'#db2777'},
    {id:'sub',label:'Subprogramas',color:'#d97706'},
    {id:'debug',label:'Depuración',color:'#16a34a'},
  ];
  const catRows=cats.map(cat=>{
    const qs=QUESTIONS.filter(q=>q.cat===cat.id);
    if(!qs.length) return '';
    const c=qs.filter(q=>{ const idx=QUESTIONS.indexOf(q); return qAnswers[idx]===q.ans; }).length;
    const p=Math.round(c/qs.length*100);
    return `<div class="cat-row"><span class="cat-name">${cat.label}</span><div class="cat-track"><div class="cat-fill" style="width:${p}%;background:${cat.color}"></div></div><span class="cat-val">${c}/${qs.length}</span></div>`;
  }).join('');
  return `<div class="results"><h2>Resultado final</h2>
    <div class="score-big ${cls}">${correct}/${total}</div>
    <div style="font-size:14px;color:var(--text2);margin-bottom:16px">${pct}% · Lenguajes de Desarrollo</div>
    <div class="cat-scores">${catRows}</div>
    <div class="nav" style="margin-top:20px">
      <button class="btn btn-primary" onclick="resetQuiz()">🔄 Reintentar</button>
      <button class="btn btn-ghost" onclick="showPage('mapa')">🗺️ Ver mapa</button>
      <button class="btn btn-ghost" onclick="showPage('flash')">🃏 Flashcards</button>
    </div>
  </div>`;
}
function resetQuiz() { qIdx=0; qAnswers=Array(QUESTIONS.length).fill(null); qLocked=Array(QUESTIONS.length).fill(false); quizDone=false; renderQuiz(); }

function toggleTheme(){
  const dark = document.body.classList.toggle('dark');
  document.getElementById('theme-btn').textContent = dark ? '☀️' : '🌙';
  localStorage.setItem('theme', dark ? 'dark' : 'light');
}

document.addEventListener('DOMContentLoaded', ()=>{
  if(localStorage.getItem('theme')==='dark'){
    document.body.classList.add('dark');
    document.getElementById('theme-btn').textContent='☀️';
  }
  renderMapa();
});
</script>
</body>
